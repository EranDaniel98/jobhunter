name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'jobhunter/backend/**'
      - 'jobhunter/frontend/**'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jobhunter-backend:scan ./jobhunter/backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'jobhunter-backend:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy SBOM generation
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'jobhunter-backend:scan'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  trivy-fs-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (secrets & misconfig)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret,misconfig'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  pip-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobhunter/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --extra dev
      - run: uv run pip-audit

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobhunter/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --package-lock-only
      - run: npm audit --audit-level=moderate
