name: Database Restore

on:
  workflow_dispatch:
    inputs:
      backup_filename:
        description: 'Backup filename (e.g. jobhunter_backup_20260317_030000.sql.gz)'
        required: true
        type: string

jobs:
  restore:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI
        run: pip install awscli

      - name: Restore database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          chmod +x jobhunter/backend/scripts/restore-db.sh
          bash jobhunter/backend/scripts/restore-db.sh "${{ inputs.backup_filename }}"
