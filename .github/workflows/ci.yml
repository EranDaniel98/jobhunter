name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter
          POSTGRES_DB: jobhunter
        options: >-
          --health-cmd "pg_isready -U jobhunter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: jobhunter/backend
    env:
      DATABASE_URL: postgresql+asyncpg://jobhunter:jobhunter@localhost:5432/jobhunter
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-not-for-production
      OPENAI_API_KEY: test-key-ci
      HUNTER_API_KEY: test-key-ci
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --extra dev
      - name: Ruff lint
        run: uv run ruff check app/
      - name: Ruff format check
        run: uv run ruff format --check app/
      - name: Mypy type check
        run: |
          ERRORS=$(uv run mypy app/ --ignore-missing-imports 2>&1 | grep -c "error:" || true)
          echo "Mypy errors: $ERRORS"
          if [ "$ERRORS" -gt 96 ]; then
            echo "::error::Mypy error count increased from baseline (96). Fix new type errors."
            uv run mypy app/ --ignore-missing-imports
            exit 1
          fi
      - name: Create test database
        run: PGPASSWORD=jobhunter psql -h localhost -U jobhunter -d jobhunter -c "CREATE DATABASE jobhunter_test;" || true
      - name: Run migrations
        run: uv run alembic upgrade head
      - run: uv run pytest tests/ -q --tb=short --cov=app --cov-report=term-missing --cov-fail-under=60
      - name: pip-audit security scan
        run: uv run pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobhunter/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Unit tests
        run: npm run test
      - run: npm run lint
      - run: npm run build
      - name: npm audit security scan
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter
          POSTGRES_DB: jobhunter
        options: >-
          --health-cmd "pg_isready -U jobhunter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://jobhunter:jobhunter@localhost:5432/jobhunter
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-not-for-production
      OPENAI_API_KEY: test-key-ci
      HUNTER_API_KEY: test-key-ci
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      E2E_API_URL: http://localhost:8000/api/v1
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      # ── Backend setup ──
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install backend deps
        working-directory: jobhunter/backend
        run: uv sync --frozen --extra dev
      - name: Run migrations
        working-directory: jobhunter/backend
        run: uv run alembic upgrade head
      - name: Seed test data
        working-directory: jobhunter/backend
        run: uv run python scripts/seed_dev_data.py || true
      - name: Start backend
        working-directory: jobhunter/backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            if [ "$i" -eq 30 ]; then
              echo "::error::Backend failed to start after 60 seconds"
              exit 1
            fi
            sleep 2
          done

      # ── Frontend setup ──
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        working-directory: jobhunter/frontend
        run: npm install
      - name: Build frontend
        working-directory: jobhunter/frontend
        run: npm run build
      - name: Start frontend
        working-directory: jobhunter/frontend
        run: |
          npm start &
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && break || sleep 2
          done

      # ── Playwright ──
      - name: Install Playwright browsers
        working-directory: jobhunter/frontend
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        working-directory: jobhunter/frontend
        run: npx playwright test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            jobhunter/frontend/test-results/
            jobhunter/frontend/playwright-report/
          retention-days: 7
