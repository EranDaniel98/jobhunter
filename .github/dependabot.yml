version: 2
updates:
  # ---------------------------------------------------------------------------
  # Backend Python deps (pip / pyproject.toml — uv-managed)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/jobhunter/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # passlib (unmaintained) reads bcrypt.__about__.__version__ which bcrypt
      # removed in 5.0, and bcrypt 5.0 rejects >72-byte inputs that 4.x
      # silently truncated. Stay on bcrypt 4.x until passlib is replaced.
      - dependency-name: "bcrypt"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Frontend JS deps (npm)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/jobhunter/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      js-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # lucide-react removed brand icons (e.g. Linkedin) in a minor bump; keep
      # majors gated behind a human review since icon set changes require
      # sweeping replacements across components.
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # GitHub Actions (workflow YAML)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # Backend Docker base image
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/jobhunter/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
